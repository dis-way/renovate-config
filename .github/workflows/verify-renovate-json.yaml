name: "Verify Renovate JSON"

on: pull_request

jobs:
  verify-renovate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Verify renovate deafult.json
        env:
          RENOVATE_VERSION: 42.14.1
          RENOVATE_CONFIG_FILE: default.json
        run: |
          npx --yes --package renovate@${RENOVATE_VERSION} -- renovate-config-validator 