name: "Verify Renovate JSON"

on: pull_request

jobs:
  verify-renovate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '24'
      - name: Verify renovate deafult.json
        env:
          RENOVATE_VERSION: 42.14.1
          RENOVATE_CONFIG_FILE: default.json
        run: |
          npx --yes --package renovate@${RENOVATE_VERSION} -- renovate-config-validator 